apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-init-script
data:
  mongo-init.js: |
    // MongoDB initialization script for Kubernetes
    db = db.getSiblingDB('logistics-tracker');
    
    // Create collections and initial indexes
    db.createCollection('users');
    db.createCollection('shipments');
    
    // Create indexes for better performance
    db.users.createIndex({ "email": 1 }, { unique: true });
    db.users.createIndex({ "phone": 1 }, { unique: true });
    db.users.createIndex({ "createdAt": -1 });
    
    db.shipments.createIndex({ "trackingNumber": 1 }, { unique: true });
    db.shipments.createIndex({ "sender.email": 1 });
    db.shipments.createIndex({ "recipient.email": 1 });
    db.shipments.createIndex({ "currentStatus": 1 });
    db.shipments.createIndex({ "createdAt": -1 });
    db.shipments.createIndex({ "service.estimatedDelivery": 1 });
    db.shipments.createIndex({ "createdBy": 1 });
    
    console.log('Database initialized with indexes');
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: "logistics-tracker"
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
        - name: mongo-init
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc
      - name: mongo-init
        configMap:
          name: mongo-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
  type: ClusterIP
