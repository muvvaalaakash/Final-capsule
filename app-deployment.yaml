apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistics-tracker
  labels:
    app: logistics-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logistics-tracker
  template:
    metadata:
      labels:
        app: logistics-tracker
    spec:
      containers:
      - name: app
        image: logistics-tracker:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/logistics-tracker"
        - name: JWT_SECRET
          value: "your-super-secret-jwt-key-change-this-in-production"
        - name: RATE_LIMIT_WINDOW_MS
          value: "900000"
        - name: RATE_LIMIT_MAX_REQUESTS
          value: "100"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: logistics-tracker-service
spec:
  selector:
    app: logistics-tracker
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  type: LoadBalancer
